<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CupX Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;
  --bg2:#0e1117;
  --bg3:#151b26;
  --accent:#00e5ff;
  --accent2:#ff6b35;
  --text:#c8d8e8;
  --muted:#4a5a6a;
  --border:#1e2a3a;
}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,229,255,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,107,53,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0e1117}
::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}

/* HEADER */
.header{position:relative;z-index:10;padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px rgba(0,229,255,0.5)}
.logo span{color:var(--muted);font-size:12px;display:block;letter-spacing:1px;margin-top:2px}
.header-actions{display:flex;gap:8px}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:4px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;transition:all 0.2s}
.btn:hover,.btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.08)}
.btn.accent{background:var(--accent);color:#000;border-color:var(--accent)}
.btn.accent:hover{background:#00c8e0}

/* CONTROL PANEL */
.controls{position:relative;z-index:10;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-wrap{position:relative}
.search-wrap input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 12px 7px 32px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:13px;width:200px;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.ctrl-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-right:4px}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:3px;cursor:pointer;font-size:10px;font-family:'Exo 2',sans-serif;letter-spacing:0.5px;transition:all 0.15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--text);color:var(--text)}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.1)}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:'Exo 2',sans-serif;font-size:12px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.temp-wrap{display:flex;align-items:center;gap:8px}
.temp-wrap input[type=range]{width:120px;accent-color:var(--accent)}
.temp-val{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);min-width:55px}

/* TABLE */
.table-scroll{overflow-x:auto;padding:10px 20px 5px;position:relative;z-index:5}
.pt-grid{display:grid;grid-template-columns:repeat(18,minmax(52px,1fr));gap:3px;min-width:980px;max-width:1400px;margin:0 auto}

/* ELEMENT CARD */
.el{
  aspect-ratio:1;padding:4px 3px 3px;cursor:pointer;border:1px solid transparent;border-radius:3px;
  display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;
  transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s,opacity 0.2s,filter 0.2s;
  background:var(--bg3);
}
.el::before{content:'';position:absolute;inset:0;opacity:0.18;transition:opacity 0.2s}
.el:hover{transform:scale(1.18);z-index:50;border-color:rgba(255,255,255,0.6)!important;box-shadow:0 0 20px rgba(0,0,0,0.8)}
.el:hover::before{opacity:0.35}
.el.dimmed{opacity:0.08;filter:grayscale(1);pointer-events:none}
.el.search-match{border-color:var(--accent)!important;box-shadow:0 0 12px rgba(0,229,255,0.4)}
.el .en{font-size:9px;color:rgba(255,255,255,0.5);font-family:'Share Tech Mono',monospace;line-height:1}
.el .es{font-size:17px;font-weight:800;text-align:center;line-height:1.1;color:#fff;font-family:'Exo 2',sans-serif}
.el .ename{font-size:7px;text-align:center;color:rgba(255,255,255,0.6);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.el .emass{font-size:7px;text-align:right;color:rgba(255,255,255,0.4);font-family:'Share Tech Mono',monospace}

/* Phase indicators */
.el.liquid .es{text-shadow:0 0 8px #4fc3f7}
.el.gas .es{text-shadow:0 0 8px #ff8a65}

/* Spacers */
.spacer{aspect-ratio:1;grid-column:span 1}
.series-label{grid-column:1/3;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.series-label span{font-size:8px;color:var(--muted);letter-spacing:0.5px;text-align:right;line-height:1.3}
.gap-row{grid-column:1/19;height:6px}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);position:relative;z-index:5}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* HEATMAP LEGEND */
.heatmap-bar{padding:6px 20px;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border)}
.heatmap-bar .gradient{flex:1;max-width:300px;height:6px;border-radius:3px;background:linear-gradient(to right,#313695,#74add1,#ffffbf,#f46d43,#a50026)}
.heatmap-label{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:flex-start;justify-content:flex-end}
.modal{width:380px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn 0.25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.modal-header{padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10;display:flex;justify-content:space-between;align-items:flex-start}
.modal-symbol-big{font-size:64px;font-weight:900;font-family:'Exo 2',sans-serif;line-height:1;color:#fff}
.modal-meta{text-align:right}
.modal-name{font-size:18px;font-weight:600;color:var(--accent)}
.modal-num{font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.modal-cat{display:inline-block;padding:3px 8px;border-radius:2px;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:6px;font-weight:600}
.modal-tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-body{padding:16px;flex:1}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.prop{background:var(--bg3);padding:8px 10px;border-radius:4px;border:1px solid var(--border)}
.prop-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.prop-val{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text)}
.prop-val.accent{color:var(--accent)}
.section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* BOHR MODEL */
.bohr{display:flex;justify-content:center;align-items:center;margin:10px 0;height:160px;position:relative}
.bohr svg{overflow:visible}
@keyframes orbit1{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg)}to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg)}}

/* ELECTRON CONFIG */
.econfig{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);background:var(--bg3);padding:10px;border-radius:4px;border:1px solid var(--border);word-break:break-all;line-height:1.6}

/* COMPARE PANEL */
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--accent);z-index:900;padding:12px 20px;display:flex;align-items:center;gap:12px;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.compare-slot{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 12px;display:flex;align-items:center;gap:8px;min-width:120px}
.compare-slot .sym{font-weight:800;font-size:18px;font-family:'Exo 2',sans-serif}
.compare-slot .nm{font-size:10px;color:var(--muted)}
.compare-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px}
.compare-table th{text-align:left;padding:5px 8px;color:var(--muted);font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.compare-table td{padding:5px 8px;border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace}
.compare-table td.best{color:#69f0ae}
.compare-table td.worst{color:#ff5252}
.compare-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px}
.compare-modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}

/* MOLAR CALC */
.molar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px}
.molar-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:440px;width:100%}
.molar-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:18px;outline:none;margin:10px 0;transition:border-color 0.2s}
.molar-input:focus{border-color:var(--accent)}
.molar-result{font-family:'Share Tech Mono',monospace;font-size:24px;color:var(--accent);margin:10px 0;min-height:32px}
.molar-breakdown{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.molar-breakdown th{text-align:left;padding:4px 8px;color:var(--muted);font-size:10px;border-bottom:1px solid var(--border)}
.molar-breakdown td{padding:4px 8px;font-family:'Share Tech Mono',monospace;border-bottom:1px solid var(--border)}
.molar-error{color:#ff5252;font-size:13px;margin-top:8px}

/* MOBILE */
@media(max-width:700px){
  .modal{width:100vw}
  .controls{padding:8px 10px}
  .search-wrap input{width:140px}
  .temp-wrap input[type=range]{width:80px}
  .header{padding:10px}
  .logo{font-size:16px}
}
</style>
</head>

// ─── UTILS ────────────────────────────────────────────────────────────────────
function lerp3(t,c1,c2,c3){
  if(t<=0.5){const s=t*2;return lerpColor(s,c1,c2)}
  else{const s=(t-0.5)*2;return lerpColor(s,c2,c3)}
}
function lerpColor(t,a,b){
  const hr=h=>parseInt(h.slice(1,3),16),hg=h=>parseInt(h.slice(3,5),16),hb=h=>parseInt(h.slice(5,7),16);
  const r=Math.round(hr(a)+(hr(b)-hr(a))*t);
  const g=Math.round(hg(a)+(hg(b)-hg(a))*t);
  const bl=Math.round(hb(a)+(hb(b)-hb(a))*t);
  return `rgb(${r},${g},${bl})`;
}
function getHeatColor(val,min,max){
  if(val==null||min==null||max==null||min===max)return null;
  const t=(val-min)/(max-min);
  return lerp3(t,'#313695','#ffffbf','#a50026');
}
function getRange(els,key){
  const vals=els.map(e=>e[key]).filter(v=>v!=null&&!isNaN(v));
  return{min:Math.min(...vals),max:Math.max(...vals)};
}

// ─── BOHR MODEL ───────────────────────────────────────────────────────────────
function BohrModel({eps,color}){
  const shells=eps||[];
  const maxR=70;
  const cx=85,cy=85;
  const radii=shells.map((_,i)=>18+i*(maxR/(shells.length||1)));
  const [tick,setTick]=React.useState(0);
  React.useEffect(()=>{
    const id=setInterval(()=>setTick(t=>t+1),50);
    return()=>clearInterval(id);
  },[]);
  return(
    <svg width="170" height="170" style={{overflow:'visible'}}>
      <circle cx={cx} cy={cy} r={10} fill={color||'#00e5ff'} opacity={0.9}/>
      {radii.map((r,si)=>{
        const count=shells[si];
        return(
          <g key={si}>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
            {Array.from({length:count}).map((_,ei)=>{
              const speed=(si+1)*0.04;
              const base=(ei/count)*Math.PI*2;
              const angle=base+tick*speed*(si%2===0?1:-1);
              const ex=cx+r*Math.cos(angle);
              const ey=cy+r*Math.sin(angle);
              return<circle key={ei} cx={ex} cy={ey} r={2.5} fill="#00e5ff" opacity={0.85}/>;
            })}
          </g>
        );
      })}
    </svg>
  );
}

// ─── MOLAR MASS CALCULATOR ────────────────────────────────────────────────────
function parseFormula(formula,elMap){
  let i=0;
  function parse(){
    const counts={};
    while(i<formula.length){
      if(formula[i]==='('){
        i++;
        const inner=parse();
        if(formula[i]!==')')throw new Error('Missing )');
        i++;
        const num=readNum()||1;
        for(const k in inner)counts[k]=(counts[k]||0)+inner[k]*num;
      }else if(formula[i]===')'){
        break;
      }else if(formula[i]>='A'&&formula[i]<='Z'){
        let sym=formula[i++];
        while(i<formula.length&&formula[i]>='a'&&formula[i]<='z')sym+=formula[i++];
        const num=readNum()||1;
        counts[sym]=(counts[sym]||0)+num;
      }else i++;
    }
    return counts;
  }
  function readNum(){
    let s='';
    while(i<formula.length&&formula[i]>='0'&&formula[i]<='9')s+=formula[i++];
    return s?parseInt(s):0;
  }
  return parse();
}

function MolarCalc({elements,onClose}){
  const [formula,setFormula]=React.useState('');
  const elMap=React.useMemo(()=>{
    const m={};elements.forEach(e=>m[e.s]=e);return m;
  },[elements]);
  const result=React.useMemo(()=>{
    if(!formula.trim())return null;
    try{
      const counts=parseFormula(formula,elMap);
      let total=0;
      const rows=[];
      for(const sym in counts){
        const el=elMap[sym];
        if(!el)return{error:`Unknown element: ${sym}`};
        const sub=el.mass*counts[sym];
        total+=sub;
        rows.push({sym,name:el.name,count:counts[sym],mass:el.mass,sub:sub.toFixed(4)});
      }
      return{total:total.toFixed(4),rows};
    }catch(e){return{error:e.message};}
  },[formula,elMap]);
  return(
    <div className="molar-overlay" onClick={onClose}>
      <div className="molar-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <div style={{fontSize:'11px',letterSpacing:'2px',color:'var(--muted)',textTransform:'uppercase'}}>Molar Mass Calculator</div>
          <button className="btn" onClick={onClose}>✕</button>
        </div>
        <input className="molar-input" placeholder="e.g. H2SO4" value={formula} onChange={e=>setFormula(e.target.value)} autoFocus/>
        {result&&!result.error&&(
          <>
            <div className="molar-result">{result.total} g/mol</div>
            <table className="molar-breakdown">
              <thead><tr><th>Symbol</th><th>Element</th><th>Count</th><th>Mass</th><th>Subtotal</th></tr></thead>
              <tbody>
                {result.rows.map(r=>(
                  <tr key={r.sym}>
                    <td style={{color:'var(--accent)'}}>{r.sym}</td>
                    <td style={{color:'var(--text)'}}>{r.name}</td>
                    <td>{r.count}</td>
                    <td>{r.mass}</td>
                    <td style={{color:'var(--accent2)'}}>{r.sub}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>
        )}
        {result&&result.error&&<div className="molar-error">⚠ {result.error}</div>}
        {!result&&<div style={{color:'var(--muted)',fontSize:'12px',marginTop:'8px'}}>Type a chemical formula above</div>}
      </div>
    </div>
  );
}

                ))}
              </div>
            </>
          )}
          {tab==='history'&&(
            <>
              <div className="prop-grid">
                <div className="prop"><div className="prop-label">Discovered</div><div className="prop-val accent">{el.disc}</div></div>
                <div className="prop"><div className="prop-label">Discovered By</div><div className="prop-val" style={{fontSize:'11px'}}>{el.by}</div></div>
              </div>
              <div className="section-title">Etymology</div>
              <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'4px',padding:'12px',fontSize:'13px',lineHeight:'1.6',color:'var(--text)'}}>
                {el.ety}
              </div>
              <div className="section-title" style={{marginTop:'14px'}}>Category</div>
              <div style={{padding:'10px',background:`${cat.color}11`,border:`1px solid ${cat.color}44`,borderRadius:'4px',color:cat.color,fontSize:'13px',textTransform:'capitalize'}}>
                {el.cat}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── COMPARE PANEL ────────────────────────────────────────────────────────────
function ComparePanel({list,onRemove,onClearAll,onOpenFull}){
  if(list.length===0)return null;
  return(
    <div className="compare-bar">
      <div style={{fontSize:'10px',color:'var(--accent)',letterSpacing:'1px',textTransform:'uppercase',whiteSpace:'nowrap'}}>Compare</div>
      {list.map(el=>{
        const cat=CATEGORIES.find(c=>c.key===el.cat)||{color:'#888'};
        return(
          <div key={el.n} className="compare-slot">
            <div className="sym" style={{color:cat.color}}>{el.s}</div>
            <div><div className="nm">{el.name}</div><div style={{fontSize:'9px',color:'var(--muted)',fontFamily:'Share Tech Mono'}}>#{el.n}</div></div>
            <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',padding:'2px',marginLeft:'auto',fontSize:'12px'}} onClick={()=>onRemove(el)}>✕</button>
          </div>
        );
      })}
      {list.length>=2&&<button className="btn accent" onClick={onOpenFull} style={{whiteSpace:'nowrap',fontSize:'11px'}}>View Comparison</button>}
      <button className="btn" onClick={onClearAll} style={{whiteSpace:'nowrap',fontSize:'11px'}}>Clear</button>
    </div>
  );
}

function CompareFullModal({list,onClose}){
  if(!list||list.length<2)return null;
  const rows=[
    {l:'Atomic Mass',k:'mass',unit:'u'},
    {l:'Electronegativity',k:'en',unit:''},
    {l:'Atomic Radius',k:'ar',unit:'pm'},
    {l:'Density',k:'d',unit:'g/cm³'},
    {l:'Melting Point',k:'mp',unit:'K'},
    {l:'Boiling Point',k:'bp',unit:'K'},
  ];
  return(
    <div className="compare-modal-overlay" onClick={onClose}>
      <div className="compare-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <div style={{fontSize:'11px',letterSpacing:'2px',color:'var(--muted)',textTransform:'uppercase'}}>Element Comparison</div>
          <button className="btn" onClick={onClose}>✕</button>
        </div>
        <table className="compare-table">
          <thead>
            <tr>
              <th>Property</th>
              {list.map(el=>{
                const cat=CATEGORIES.find(c=>c.key===el.cat)||{color:'#888'};
                return<th key={el.n} style={{color:cat.color}}>{el.s} — {el.name}</th>;
              })}
            </tr>
          </thead>
          <tbody>
            {rows.map(row=>{
              const vals=list.map(el=>el[row.k]);
              const numVals=vals.filter(v=>v!=null);
              const best=numVals.length?Math.max(...numVals):null;
              const worst=numVals.length?Math.min(...numVals):null;
              return(
                <tr key={row.l}>
                  <td style={{color:'var(--muted)',fontFamily:'Exo 2'}}>{row.l}</td>
                  {vals.map((v,i)=>{
                    let cls='';
                    if(v!=null&&v===best&&best!==worst)cls='best';
                    else if(v!=null&&v===worst&&best!==worst)cls='worst';
                    return<td key={i} className={cls}>{v!=null?`${v} ${row.unit}`:'—'}</td>;
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── ELEMENT CARD ─────────────────────────────────────────────────────────────
function ElementCard({el,dimmed,heatColor,phase,searchMatch,onClick}){
  const cat=CATEGORIES.find(c=>c.key===el.cat)||{color:'#888'};
  const bgColor=heatColor||`${cat.color}28`;
  const borderColor=heatColor?`${heatColor}88`:searchMatch?'var(--accent)':'transparent';
  const cls=['el',dimmed?'dimmed':'',searchMatch?'search-match':'',phase].filter(Boolean).join(' ');
  return(
    <div className={cls} style={{backgroundColor:bgColor,borderColor,gridColumn:el.g,gridRow:el.p}} onClick={onClick}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <span className="en">{el.n}</span>
      </div>
      <span className="es">{el.s}</span>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <span className="ename">{el.name}</span>
        <span className="emass">{el.mass}</span>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App=()=>{
  const [activeFilter,setActiveFilter]=React.useState(null);
  const [heatProp,setHeatProp]=React.useState(null);
  const [temp,setTemp]=React.useState(298);
  const [search,setSearch]=React.useState('');
  const [selected,setSelected]=React.useState(null);
  const [compareList,setCompareList]=React.useState([]);
  const [showCompare,setShowCompare]=React.useState(false);
  const [showMolar,setShowMolar]=React.useState(false);

  const heatRange=React.useMemo(()=>heatProp?getRange(ELEMENTS,heatProp):null,[heatProp]);

  const addCompare=el=>{
    setCompareList(prev=>{
      if(prev.some(c=>c.n===el.n))return prev.filter(c=>c.n!==el.n);
      if(prev.length>=3)return prev;
      return[...prev,el];
    });
  };

  const getPhase=el=>{
    if(el.mp==null)return '';
    if(temp<el.mp)return 'solid';
    if(el.bp==null||temp<el.bp)return 'liquid';
    return 'gas';
  };

  // Position lanthanides row 8, actinides row 9
  const getPos=el=>{
    if(el.g!=null)return{col:el.g,row:el.p};
    if(el.cat==='lanthanide'){return{col:el.n-54,row:8};}
    if(el.cat==='actinide'){return{col:el.n-86,row:9};}
    return{col:1,row:1};
  };

  // Phase summary for temp bar
  const phaseSummary=React.useMemo(()=>{
    const s=ELEMENTS.filter(e=>getPhase(e)==='solid').length;
    const l=ELEMENTS.filter(e=>getPhase(e)==='liquid').length;
    const g=ELEMENTS.filter(e=>getPhase(e)==='gas').length;
    return`${s} solid · ${l} liquid · ${g} gas`;
  },[temp]);

  const stateColors={solid:'rgba(180,200,255,0.12)',liquid:'rgba(100,200,255,0.18)',gas:'rgba(255,150,80,0.18)'};

  return(
    <div style={{minHeight:'100vh',position:'relative',zIndex:1}}>
      {/* HEADER */}
      <div className="header">
        <div className="logo">CUPX PERIODIC TABLE<span>Interactive Element Explorer</span></div>
        <div className="header-actions">
          <button className="btn" onClick={()=>setShowMolar(true)}>⚗ Molar Calc</button>
          {compareList.length>=2&&<button className="btn accent" onClick={()=>setShowCompare(true)}>Compare ({compareList.length})</button>}
        </div>
      </div>

      {/* CONTROLS */}
      <div className="controls">
        {/* Search */}
        <div className="search-wrap">
          <input type="text" placeholder="Search elements..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        {/* Category Filters */}
        <div className="ctrl-group">
          <span className="ctrl-label">Filter</span>
          {CATEGORIES.map(cat=>(
            <button key={cat.key} className={`filter-btn ${activeFilter===cat.key?'active':''}`}
              style={activeFilter===cat.key?{borderColor:cat.color,color:cat.color,background:`${cat.color}18`}:{}}
              onClick={()=>setActiveFilter(activeFilter===cat.key?null:cat.key)}>
              {cat.label}
            </button>
          ))}
        </div>

        {/* Heatmap */}
        <div className="ctrl-group">
          <span className="ctrl-label">Heatmap</span>
          <select value={heatProp||''} onChange={e=>setHeatProp(e.target.value||null)}>
            {HEATMAP_PROPS.map(p=><option key={p.label} value={p.key||''}>{p.label}</option>)}
          </select>
        </div>

        {/* Temperature */}
        <div className="ctrl-group">
          <span className="ctrl-label">Temp</span>
          <div className="temp-wrap">
            <input type="range" min="0" max="6000" step="10" value={temp} onChange={e=>setTemp(+e.target.value)}/>
            <span className="temp-val">{temp}K</span>
          </div>
          <span style={{fontSize:'10px',color:'var(--muted)'}}>{phaseSummary}</span>
        </div>
      </div>

      {/* HEATMAP LEGEND */}
      {heatProp&&heatRange&&(
        <div className="heatmap-bar">
          <span className="heatmap-label">{HEATMAP_PROPS.find(p=>p.key===heatProp)?.label}</span>
          <span style={{fontSize:'10px',color:'var(--muted)'}}>{heatRange.min.toFixed(1)}</span>
          <div className="gradient"/>
          <span style={{fontSize:'10px',color:'var(--muted)'}}>{heatRange.max.toFixed(1)}</span>
        </div>
      )}

      {/* CATEGORY LEGEND */}
      <div className="legend">
        {CATEGORIES.map(cat=>(
          <div key={cat.key} className="legend-item">
            <div className="legend-dot" style={{background:cat.color}}/>
            {cat.label}
          </div>
        ))}
        <div className="legend-item" style={{marginLeft:'10px'}}>
          <div className="legend-dot" style={{border:'2px solid rgba(100,200,255,0.5)',background:'rgba(100,200,255,0.1)'}}/>Liquid
        </div>
        <div className="legend-item">
          <div className="legend-dot" style={{border:'2px solid rgba(255,150,80,0.5)',background:'rgba(255,150,80,0.1)'}}/>Gas
        </div>
      </div>

      {/* PERIODIC TABLE GRID */}
      <div className="table-scroll">
        <div className="pt-grid">
          {ELEMENTS.map(el=>{
            const pos=getPos(el);
            const sq=search.toLowerCase();
            const isMatch=sq&&(el.name.toLowerCase().includes(sq)||el.s.toLowerCase().includes(sq)||el.n.toString().includes(sq));
            const isDimmed=(activeFilter&&el.cat!==activeFilter)||(sq&&!isMatch);
            const heatColor=heatProp&&heatRange?getHeatColor(el[heatProp],heatRange.min,heatRange.max):null;
            const phase=getPhase(el);
            return(
              <div key={el.n} style={{
                gridColumn:pos.col,
                gridRow:pos.row,
                background:isDimmed?'transparent':phase==='liquid'?stateColors.liquid:phase==='gas'?stateColors.gas:'transparent',
                borderRadius:'3px',
                padding:0,
              }}>
                <ElementCard
                  el={{...el,g:1,p:1}}
                  dimmed={isDimmed}
                  heatColor={heatColor}
                  phase={phase}
                  searchMatch={!!isMatch}
                  onClick={()=>setSelected(el)}
                />
              </div>
            );
          })}
          {/* Gap row between main table and lanthanide/actinide series */}
          <div style={{gridColumn:'1/19',gridRow:7,height:'6px'}}/>
          {/* Series labels */}
          <div style={{gridColumn:'1/3',gridRow:8,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'4px'}}>
            <span style={{fontSize:'7px',color:'var(--muted)',textAlign:'right',lineHeight:'1.3'}}>Lantha-<br/>nides</span>
          </div>
          <div style={{gridColumn:'1/3',gridRow:9,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'4px'}}>
            <span style={{fontSize:'7px',color:'var(--muted)',textAlign:'right',lineHeight:'1.3'}}>Acti-<br/>nides</span>
          </div>
        </div>
      </div>

      {/* MODALS */}
      {selected&&(
        <DetailModal el={selected} onClose={()=>setSelected(null)} onCompare={addCompare} compareList={compareList}/>
      )}
      {showMolar&&<MolarCalc elements={ELEMENTS} onClose={()=>setShowMolar(false)}/>}
      {showCompare&&<CompareFullModal list={compareList} onClose={()=>setShowCompare(false)}/>}

      {/* COMPARE BAR */}
      <ComparePanel
        list={compareList}
        onRemove={el=>setCompareList(prev=>prev.filter(c=>c.n!==el.n))}
        onClearAll={()=>setCompareList([])}
        onOpenFull={()=>setShowCompare(true)}
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#020617;--bg3:#1e293b;
  --accent:#38bdf8;--accent2:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--border:#1e3a5f;
  --card:#0f1e33;--shadow:rgba(0,0,0,0.5);
  --green:#4ade80;--red:#f87171;--orange:#fb923c;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;
    --accent:#0284c7;--accent2:#d97706;
    --text:#0f172a;--muted:#64748b;--border:#cbd5e1;
    --card:#ffffff;--shadow:rgba(0,0,0,0.12);
  }
  body::before{display:none}
  .el .en{color:rgba(0,0,0,0.4)}
  .el .es{color:#0f172a}
  .el .ename{color:rgba(0,0,0,0.5)}
  .el .emass{color:rgba(0,0,0,0.3)}
  .modal,.modal-header{background:#fff}
  .prop,.econfig{background:#f8fafc}
  .compare-bar,.compare-slot{background:#fff}
  .molar-box,.compare-modal{background:#fff}
  ::-webkit-scrollbar-track{background:#e2e8f0}
  ::-webkit-scrollbar-thumb{background:#94a3b8}
}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(56,189,248,0.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(245,158,11,0.04) 0%,transparent 55%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background-color:#020617;position:relative;z-index:20;border-bottom:1px solid rgba(56,189,248,0.15)}
.logo-block{display:flex;flex-direction:column;gap:1px}
.logo-title{font-size:22px;font-weight:900;color:#38bdf8;line-height:1.2;display:block;letter-spacing:0.3px}
.logo-sub{font-size:13.3px;font-weight:400;color:#64748b;line-height:1.2;display:block}
header a{color:#38bdf8;text-decoration:none;font-size:14px;font-weight:700}
header a:hover{text-decoration:underline}

/* BUTTONS */
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;transition:all 0.18s;white-space:nowrap}
.btn:hover,.btn.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,0.08)}
.btn.accent-btn{background:var(--accent);color:#020617;border-color:var(--accent);font-weight:900}
.btn.accent-btn:hover{opacity:0.88}

/* CONTROLS */
.controls{position:relative;z-index:10;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
.search-wrap{position:relative;flex:1;min-width:260px;max-width:460px}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px 10px 40px;border-radius:6px;font-family:'Lato',sans-serif;font-size:14px;font-weight:400;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;pointer-events:none}
.ctrl-group{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ctrl-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-right:2px;white-space:nowrap}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:4px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;font-weight:700;transition:all 0.15s;white-space:nowrap}
.filter-btn:hover{border-color:var(--text);color:var(--text)}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,0.1)}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'Lato',sans-serif;font-size:13px;font-weight:400;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}

/* TEMPERATURE */
.temp-block{display:flex;flex-direction:column;gap:5px;flex:1;min-width:320px;max-width:580px}
.temp-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.temp-controls input[type=range]{flex:1;min-width:200px;accent-color:var(--accent);cursor:pointer;height:5px}
.temp-number{width:78px;background:var(--bg);border:1px solid var(--border);color:var(--accent);padding:7px 8px;border-radius:5px;font-family:monospace;font-size:13px;text-align:center;outline:none}
.temp-number:focus{border-color:var(--accent)}
.unit-toggle{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.unit-toggle button{background:transparent;border:none;color:var(--muted);padding:6px 10px;cursor:pointer;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;transition:all 0.15s}
.unit-toggle button.active{background:var(--accent);color:#020617}
.phase-summary{font-size:11px;color:var(--muted);font-weight:400}

/* TABLE */
.table-scroll{overflow-x:auto;padding:12px 20px 6px;position:relative;z-index:5}
.pt-grid{display:grid;grid-template-columns:repeat(18,minmax(52px,1fr));gap:3px;min-width:980px;max-width:1400px;margin:0 auto}

/* ELEMENT CARD */
.el{aspect-ratio:1;padding:4px 3px 3px;cursor:pointer;border:1px solid transparent;border-radius:4px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s,opacity 0.2s,filter 0.2s;background:var(--card)}
.el:hover{transform:scale(1.18);z-index:50;border-color:rgba(255,255,255,0.5)!important;box-shadow:0 0 22px var(--shadow)}
.el.dimmed{opacity:0.07;filter:grayscale(1);pointer-events:none}
.el.search-match{border-color:var(--accent)!important;box-shadow:0 0 10px rgba(56,189,248,0.4)}
.el .en{font-size:9px;color:rgba(255,255,255,0.45);font-family:monospace;line-height:1}
.el .es{font-size:17px;font-weight:900;text-align:center;line-height:1.1;color:#fff}
.el .ename{font-size:7px;text-align:center;color:rgba(255,255,255,0.55);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.el .emass{font-size:7px;text-align:right;color:rgba(255,255,255,0.35);font-family:monospace}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);position:relative;z-index:5}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:400}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* HEATMAP BAR */
.heatmap-bar{padding:7px 20px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.heatmap-bar .gradient{flex:1;max-width:300px;height:6px;border-radius:3px;background:linear-gradient(to right,#313695,#74add1,#ffffbf,#f46d43,#a50026)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:flex-start;justify-content:flex-end}
.modal{width:385px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;animation:slideIn 0.22s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.modal-header{padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10;display:flex;justify-content:space-between;align-items:flex-start}
.modal-symbol-big{font-size:60px;font-weight:900;line-height:1}
.modal-meta{text-align:right}
.modal-name{font-size:17px;font-weight:700;color:var(--accent)}
.modal-num{font-size:12px;color:var(--muted);font-family:monospace}
.modal-cat{display:inline-block;padding:3px 8px;border-radius:3px;font-size:10px;text-transform:uppercase;margin-top:6px;font-weight:700}
.modal-tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;font-weight:700;letter-spacing:0.3px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-body{padding:16px;flex:1}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.prop{background:var(--bg3);padding:8px 10px;border-radius:5px;border:1px solid var(--border)}
.prop-label{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;font-weight:700;letter-spacing:0.4px}
.prop-val{font-family:monospace;font-size:13px;color:var(--text)}
.prop-val.accent{color:var(--accent)}
.section-title{font-size:10px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px;display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:0.5px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.econfig{font-family:monospace;font-size:12px;color:var(--accent);background:var(--bg3);padding:10px;border-radius:5px;border:1px solid var(--border);word-break:break-all;line-height:1.7}
.bohr{display:flex;justify-content:center;align-items:center;margin:8px 0;height:170px}
.bohr svg{overflow:visible}
.bohr-controls{display:flex;justify-content:center;margin-bottom:4px}

/* COMPARE */
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--accent);z-index:900;padding:12px 20px;display:flex;align-items:center;gap:12px;animation:slideUp 0.2s ease;flex-wrap:wrap}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.compare-slot{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 12px;display:flex;align-items:center;gap:8px;min-width:120px}
.compare-slot .sym{font-weight:900;font-size:17px}
.compare-slot .nm{font-size:10px;color:var(--muted)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.compare-table th{text-align:left;padding:6px 8px;color:var(--muted);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:700}
.compare-table td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:monospace}
.compare-table td.best{color:var(--green)}
.compare-table td.worst{color:var(--red)}
.compare-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px}
.compare-modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto}

/* MOLAR CALC */
.molar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px}
.molar-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.molar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.molar-tabs{display:flex;border-bottom:1px solid var(--border)}
.molar-tab{flex:1;padding:10px;text-align:center;font-size:12px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;font-weight:700;letter-spacing:0.3px}
.molar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.molar-content{padding:18px 20px}
.molar-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:6px;font-family:monospace;font-size:17px;outline:none;margin-bottom:12px;transition:border-color 0.2s}
.molar-input:focus{border-color:var(--accent)}
.molar-input-sm{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:5px;font-family:'Lato',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;margin-bottom:0}
.molar-input-sm:focus{border-color:var(--accent)}
.molar-result{font-family:monospace;font-size:22px;color:var(--accent);margin:10px 0;min-height:30px;font-weight:400}
.molar-breakdown{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.molar-breakdown th{text-align:left;padding:5px 8px;color:var(--muted);font-size:10px;border-bottom:1px solid var(--border);font-weight:700;text-transform:uppercase}
.molar-breakdown td{padding:5px 8px;font-family:monospace;border-bottom:1px solid var(--border)}
.molar-error{color:var(--red);font-size:13px;margin-top:8px;font-weight:700}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.input-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
.badge-orange{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.3)}
.badge-grey{background:rgba(100,116,139,0.15);color:var(--muted);border:1px solid rgba(100,116,139,0.3)}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.result-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.result-card.highlight{border-color:rgba(56,189,248,0.4);background:rgba(56,189,248,0.06)}
.result-label{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.4px;margin-bottom:4px}
.result-val{font-family:monospace;font-size:15px;color:var(--text)}
.result-val.accent{color:var(--accent)}
.result-val.accent2{color:var(--accent2)}
.medium-select{background:var(--bg);border:1px solid var(--orange);color:var(--text);padding:6px 10px;border-radius:5px;font-family:'Lato',sans-serif;font-size:12px;outline:none;cursor:pointer;width:100%;margin-bottom:8px}

/* FOOTER */
footer{text-align:center;padding:20px;font-size:13px;background-color:#020617;color:#64748b;margin-top:40px;font-weight:400;border-top:1px solid rgba(56,189,248,0.1)}

@media(max-width:700px){
  .modal{width:100vw}
  .controls{padding:8px 12px}
  .search-wrap{min-width:180px}
  header{padding:10px 14px}
  .logo-title{font-size:18px}
  .logo-sub{font-size:12px}
  .temp-controls input[type=range]{min-width:100px}
  .temp-block{min-width:220px}
  .results-grid{grid-template-columns:1fr}
  .input-row{grid-template-columns:1fr}
}
</style>
</head>

// ─── UTILS ────────────────────────────────────────────────────────────────────
function lerpColor(t,a,b){
  const p=s=>parseInt(s,16);
  const r=Math.round(p(a.slice(1,3))+(p(b.slice(1,3))-p(a.slice(1,3)))*t);
  const g=Math.round(p(a.slice(3,5))+(p(b.slice(3,5))-p(a.slice(3,5)))*t);
  const bl=Math.round(p(a.slice(5,7))+(p(b.slice(5,7))-p(a.slice(5,7)))*t);
  return`rgb(${r},${g},${bl})`;
}
function getHeatColor(val,min,max){
  if(val==null||min==null||max==null||min===max)return null;
  const t=(val-min)/(max-min);
  return t<=0.5?lerpColor(t*2,'#313695','#ffffbf'):lerpColor((t-0.5)*2,'#ffffbf','#a50026');
}
function getRange(els,key){
  const vals=els.map(e=>e[key]).filter(v=>v!=null&&!isNaN(v));
  return{min:Math.min(...vals),max:Math.max(...vals)};
}

// ─── TEMP CONVERSIONS ─────────────────────────────────────────────────────────
function kToUnit(k,u){
  if(u==='C')return+(k-273.15).toFixed(1);
  if(u==='F')return+((k-273.15)*9/5+32).toFixed(1);
  return k;
}
function unitToK(v,u){
  if(u==='C')return Math.round(+v+273.15);
  if(u==='F')return Math.round((+v-32)*5/9+273.15);
  return Math.round(+v);
}
function unitRange(u){
  if(u==='C')return{min:-273,max:5727};
  if(u==='F')return{min:-460,max:10340};
  return{min:0,max:6000};
}

// ─── FORMULA PARSER ───────────────────────────────────────────────────────────
function parseFormula(f,elMap){
  let i=0;
  function parse(){
    const c={};
    while(i<f.length){
      if(f[i]==='('){i++;const inn=parse();if(f[i]===')'){i++;}const n=rd()||1;for(const k in inn)c[k]=(c[k]||0)+inn[k]*n;}
      else if(f[i]===')'){break;}
      else if(f[i]>='A'&&f[i]<='Z'){let s=f[i++];while(i<f.length&&f[i]>='a'&&f[i]<='z')s+=f[i++];const n=rd()||1;c[s]=(c[s]||0)+n;}
      else i++;
    }
    return c;
  }
  function rd(){let s='';while(i<f.length&&f[i]>='0'&&f[i]<='9')s+=f[i++];return s?parseInt(s):0;}
  return parse();
}

// ─── N-FACTOR DETECTION ───────────────────────────────────────────────────────
// Returns { nFactor, tier, label, needsMedium, symbol }
function detectNFactor(formula,elMap,medium){
  if(!formula.trim())return null;
  let counts;
  try{ counts=parseFormula(formula,elMap); }catch(e){ return null; }

  const syms=Object.keys(counts);
  const up=formula.toUpperCase();

  // Tier 2 — variable oxidation state compounds (check first for specific formulas)
  const tier2={
    'KMNO4':{Acidic:5,Basic:3,Neutral:1},
    'K2CR2O7':{Acidic:6,Basic:6,Neutral:6},
    'K2CRO4':{Acidic:6,Basic:6,Neutral:6},
    'NA2CR2O7':{Acidic:6,Basic:6,Neutral:6},
  };
  const normKey=formula.replace(/\d/g,'').replace(/[()]/g,'').toUpperCase().split('').sort().join('');
  for(const key in tier2){
    const kn=key.replace(/\d/g,'').split('').sort().join('');
    if(normKey===kn||up.includes(key.replace(/\d/g,''))){
      const med=medium||'Acidic';
      return{nFactor:tier2[key][med]||tier2[key]['Acidic'],tier:2,label:`Guided (${med} medium): n = ${tier2[key][med]||tier2[key]['Acidic']}`,needsMedium:true};
    }
  }
  // Tier 2 — elements with variable oxidation
  const variableEls=['Fe','Mn','Cr','V','Co','Cu','Pb','Sn'];
  const hasVariable=syms.find(s=>variableEls.includes(s));
  if(hasVariable){
    const el=elMap[hasVariable];
    const med=medium||'default';
    let nf=el&&el.ox&&el.ox.length>0?Math.abs(el.ox[0]):1;
    // context-specific overrides
    if(hasVariable==='Fe'&&med==='Basic')nf=1;
    else if(hasVariable==='Fe')nf=3;
    else if(hasVariable==='Mn'&&med==='Basic')nf=3;
    else if(hasVariable==='Mn'&&med==='Neutral')nf=1;
    else if(hasVariable==='Mn')nf=5;
    else if(hasVariable==='Cr')nf=3;
    else if(hasVariable==='Cu')nf=2;
    return{nFactor:nf,tier:2,label:`Guided (${med}): n = ${nf}`,needsMedium:true,symbol:hasVariable};
  }

  // Tier 1 — Acids: starts with H and has ionisable H
  if(counts['H']&&syms[0]==='H'){
    const nf=counts['H'];
    return{nFactor:nf,tier:1,label:`Auto-detected (acid, H count): n = ${nf}`,needsMedium:false};
  }
  // Tier 1 — Bases: contains OH
  const ohCount=formula.match(/OH/g);
  if(ohCount){
    const nf=ohCount.length;
    return{nFactor:nf,tier:1,label:`Auto-detected (base, OH count): n = ${nf}`,needsMedium:false};
  }
  // Tier 1 — Salts: find metal, use its primary oxidation state
  const metals=['Na','K','Ca','Mg','Al','Fe','Zn','Cu','Ag','Ba','Li','Sr','Cs','Rb','Be'];
  const metal=syms.find(s=>metals.includes(s));
  if(metal){
    const el=elMap[metal];
    if(el&&el.ox&&el.ox.length>0){
      const nf=Math.abs(el.ox[0]);
      return{nFactor:nf,tier:1,label:`Auto-detected (salt, ${metal} oxidation state): n = ${nf}`,needsMedium:false};
    }
  }

  // Tier 3 — fallback
  return{nFactor:null,tier:3,label:'Could not auto-detect',needsMedium:false};
}

// ─── MOLAR MASS CALCULATOR (with Solution tab) ────────────────────────────────
function MolarCalc({onClose}){
  const [activeTab,setActiveTab]=React.useState('molar');
  const [formula,setFormula]=React.useState('');
  const [givenMass,setGivenMass]=React.useState('');
  const [volume,setVolume]=React.useState('');
  const [solventMass,setSolventMass]=React.useState('');
  const [manualN,setManualN]=React.useState('');
  const [medium,setMedium]=React.useState('Acidic');

  const elMap=React.useMemo(()=>{const m={};ELEMENTS.forEach(e=>m[e.s]=e);return m;},[]);

  // Molar mass calc
  const molarResult=React.useMemo(()=>{
    if(!formula.trim())return null;
    try{
      const counts=parseFormula(formula,elMap);
      let total=0;const rows=[];
      for(const sym in counts){
        const el=elMap[sym];
        if(!el)return{error:`Unknown element: ${sym}`};
        const sub=el.mass*counts[sym];total+=sub;
        rows.push({sym,name:el.name,count:counts[sym],mass:el.mass,sub:sub.toFixed(4)});
      }
      return{total:total.toFixed(4),rows};
    }catch(e){return{error:e.message};}
  },[formula,elMap]);

  // N-factor detection
  const nInfo=React.useMemo(()=>detectNFactor(formula,elMap,medium),[formula,elMap,medium]);
  const nFactor=nInfo&&nInfo.tier<3?nInfo.nFactor:(manualN?+manualN:null);

  // Solution calculations
  const sol=React.useMemo(()=>{
    if(!molarResult||molarResult.error||!molarResult.total)return null;
    const M=+molarResult.total;
    const gm=givenMass?+givenMass:null;
    const volL=volume?+volume/1000:null;
    const solKg=solventMass?+solventMass/1000:null;
    const nf=nFactor;
    const fmt=v=>v!=null&&isFinite(v)?v.toFixed(4):'—';
    const moles=gm&&M?gm/M:null;
    const eqWt=nf&&M?M/nf:null;
    const gramEq=gm&&eqWt?gm/eqWt:null;
    const molarity=moles&&volL?moles/volL:null;
    const normality=gramEq&&volL?gramEq/volL:null;
    const molality=moles&&solKg?moles/solKg:null;
    const moleFracSolute=moles&&solKg?(moles/(moles+(solKg*1000/18))):null;
    return{
      molarMass:fmt(M),
      nFactor:nf!=null?nf:'—',
      eqWt:fmt(eqWt),
      moles:fmt(moles),
      gramEq:fmt(gramEq),
      molarity:fmt(molarity),
      normality:fmt(normality),
      molality:fmt(molality),
      moleFrac:fmt(moleFracSolute),
    };
  },[molarResult,givenMass,volume,solventMass,nFactor]);

  const f=v=>(v&&v!=='—')?<span style={{color:'var(--accent)'}}>{v}</span>:'—';
  const fH=v=>(v&&v!=='—')?<span style={{color:'var(--accent)',fontSize:'17px',fontWeight:'400'}}>{v}</span>:'—';

  return(
    <div className="molar-overlay" onClick={onClose}>
      <div className="molar-box" onClick={e=>e.stopPropagation()}>
        <div className="molar-header">
          <span style={{fontSize:'15px',fontWeight:'700'}}>Chemistry Calculator</span>
          <button className="btn" onClick={onClose}>✕</button>
        </div>
        <div className="molar-tabs">
          <div className={`molar-tab ${activeTab==='molar'?'active':''}`} onClick={()=>setActiveTab('molar')}>Molar Mass</div>
          <div className={`molar-tab ${activeTab==='solution'?'active':''}`} onClick={()=>setActiveTab('solution')}>Solution</div>
        </div>
        <div className="molar-content">
          {/* Shared formula input */}
          <div className="input-label">Chemical Formula</div>
          <input className="molar-input" placeholder="e.g. H2SO4 or Ca(OH)2 or KMnO4" value={formula} onChange={e=>setFormula(e.target.value)} autoFocus/>

          {/* ── MOLAR MASS TAB ── */}
          {activeTab==='molar'&&<>
            {molarResult&&!molarResult.error&&<>
              <div className="molar-result">{molarResult.total} g/mol</div>
              <table className="molar-breakdown">
                <thead><tr><th>Symbol</th><th>Name</th><th>Count</th><th>Atomic Mass</th><th>Subtotal</th></tr></thead>
                <tbody>{molarResult.rows.map(r=>(
                  <tr key={r.sym}>
                    <td style={{color:'var(--accent)'}}>{r.sym}</td>
                    <td>{r.name}</td><td>{r.count}</td>
                    <td style={{fontFamily:'monospace'}}>{r.mass}</td>
                    <td style={{color:'var(--accent2)'}}>{r.sub}</td>
                  </tr>
                ))}</tbody>
              </table>
            </>}
            {molarResult&&molarResult.error&&<div className="molar-error">⚠ {molarResult.error}</div>}
            {!molarResult&&<div style={{color:'var(--muted)',fontSize:'13px'}}>Type a chemical formula above</div>}
          </>}

          {/* ── SOLUTION TAB ── */}
          {activeTab==='solution'&&<>

            {/* N-factor section */}
            <div className="input-label" style={{marginBottom:'6px'}}>n-factor Detection</div>
            {nInfo&&nInfo.tier===1&&<div className="badge badge-green">✓ {nInfo.label}</div>}
            {nInfo&&nInfo.tier===2&&<>
              <div className="badge badge-orange">⚡ {nInfo.label}</div>
              {nInfo.needsMedium&&(
                <select className="medium-select" value={medium} onChange={e=>setMedium(e.target.value)}>
                  <option>Acidic</option>
                  <option>Basic</option>
                  <option>Neutral</option>
                </select>
              )}
            </>}
            {nInfo&&nInfo.tier===3&&<>
              <div className="badge badge-grey">Manual input required</div>
              <div className="input-label" style={{marginTop:'8px'}}>Enter n-factor manually</div>
              <input className="molar-input-sm" type="number" min="1" step="1" placeholder="e.g. 2"
                value={manualN} onChange={e=>setManualN(e.target.value)} style={{marginBottom:'10px'}}/>
            </>}
            {!nInfo&&formula&&<div style={{color:'var(--muted)',fontSize:'12px',marginBottom:'8px'}}>Enter a valid formula above</div>}

            {/* Input fields */}
            <div style={{marginTop:'10px'}}>
              <div className="input-row">
                <div>
                  <div className="input-label">Given Mass (g)</div>
                  <input className="molar-input-sm" type="number" placeholder="e.g. 4.9" value={givenMass} onChange={e=>setGivenMass(e.target.value)}/>
                </div>
                <div>
                  <div className="input-label">Volume of Solution (mL)</div>
                  <input className="molar-input-sm" type="number" placeholder="e.g. 500" value={volume} onChange={e=>setVolume(e.target.value)}/>
                </div>
              </div>
              <div className="input-row">
                <div>
                  <div className="input-label">Mass of Solvent (g)</div>
                  <input className="molar-input-sm" type="number" placeholder="e.g. 250" value={solventMass} onChange={e=>setSolventMass(e.target.value)}/>
                </div>
                <div>
                  <div className="input-label" style={{marginBottom:'4px'}}>Molar Mass</div>
                  <div style={{fontFamily:'monospace',fontSize:'14px',color:'var(--accent)',paddingTop:'8px'}}>
                    {molarResult&&!molarResult.error?`${molarResult.total} g/mol`:'—'}
                  </div>
                </div>
              </div>
            </div>

            {/* Results */}
            {sol&&<>
              <div className="section-title" style={{marginTop:'14px'}}>Results</div>
              <div className="results-grid">
                <div className="result-card highlight">
                  <div className="result-label">Molarity (M)</div>
                  <div className="result-val accent">{fH(sol.molarity)} mol/L</div>
                </div>
                <div className="result-card highlight">
                  <div className="result-label">Normality (N)</div>
                  <div className="result-val accent">{fH(sol.normality)} eq/L</div>
                </div>
                <div className="result-card highlight">
                  <div className="result-label">Molality (m)</div>
                  <div className="result-val accent">{fH(sol.molality)} mol/kg</div>
                </div>
                <div className="result-card">
                  <div className="result-label">Moles of Solute</div>
                  <div className="result-val">{f(sol.moles)} mol</div>
                </div>
                <div className="result-card">
                  <div className="result-label">n-factor</div>
                  <div className="result-val">{sol.nFactor}</div>
                </div>
                <div className="result-card">
                  <div className="result-label">Equivalent Weight</div>
                  <div className="result-val">{f(sol.eqWt)} g/eq</div>
                </div>
                <div className="result-card">
                  <div className="result-label">Gram Equivalents</div>
                  <div className="result-val">{f(sol.gramEq)} eq</div>
                </div>
                <div className="result-card">
                  <div className="result-label">Mole Fraction (solute)</div>
                  <div className="result-val">{f(sol.moleFrac)}</div>
                </div>
              </div>
              <div style={{marginTop:'10px',fontSize:'11px',color:'var(--muted)',lineHeight:'1.6'}}>
                Formulas: M = n/V(L) · N = geq/V(L) · m = n/kg(solvent) · EqWt = MM/n-factor
              </div>
            </>}
            {!formula&&<div style={{color:'var(--muted)',fontSize:'13px'}}>Enter a formula to begin</div>}
          </>}
        </div>
      </div>
    </div>
  );
}

// ─── BOHR MODEL — slow animation ──────────────────────────────────────────────
function BohrModel({eps,color,animOn}){
  const shells=eps||[];
  const cx=85,cy=85;
  const radii=shells.map((_,i)=>18+i*(62/Math.max(shells.length,1)));
  const [tick,setTick]=React.useState(0);
  React.useEffect(()=>{
    if(!animOn)return;
    const id=setInterval(()=>setTick(t=>t+1),80); // slow: 80ms tick, 0.012 speed
    return()=>clearInterval(id);
  },[animOn]);
  return(
    <svg width="170" height="170" style={{overflow:'visible'}}>
      <circle cx={cx} cy={cy} r={10} fill={color||'#38bdf8'} opacity={0.9}/>
      {radii.map((r,si)=>(
        <g key={si}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
          {Array.from({length:shells[si]}).map((_,ei)=>{
            const speed=(si+1)*0.012;
            const base=(ei/shells[si])*Math.PI*2;
            const angle=base+(animOn?tick*speed*(si%2===0?1:-1):0);
            return<circle key={ei} cx={cx+r*Math.cos(angle)} cy={cy+r*Math.sin(angle)} r={2.5} fill="#38bdf8" opacity={0.85}/>;
          })}
        </g>
      ))}
    </svg>
  );
}

          ))}
        </div>

        {/* Heatmap */}
        <div className="ctrl-group">
          <span className="ctrl-label">Heatmap</span>
          <select value={heatProp||''} onChange={e=>setHeatProp(e.target.value||null)}>
            {HEATMAP_PROPS.map(p=><option key={p.label} value={p.key||''}>{p.label}</option>)}
          </select>
        </div>

        {/* Temperature — longer slider + number + K/C/F */}
        <div className="ctrl-group" style={{flex:1,minWidth:'320px'}}>
          <span className="ctrl-label">Temperature</span>
          <div className="temp-block">
            <div className="temp-controls">
              <input type="range" min={sMin} max={sMax} step="1" value={displayTemp} onChange={e=>handleTempSlider(e.target.value)}/>
              <input type="number" className="temp-number" value={displayTemp} onChange={e=>handleTempNumber(e.target.value)}/>
              <div className="unit-toggle">
                {['K','C','F'].map(u=><button key={u} className={tempUnit===u?'active':''} onClick={()=>setTempUnit(u)}>{u==='C'?'°C':u==='F'?'°F':'K'}</button>)}
              </div>
            </div>
            <div className="phase-summary">{phaseSummary}</div>
          </div>
        </div>

        {/* Tool buttons */}
        <div className="ctrl-group">
          <button className="btn" onClick={()=>setShowMolar(true)}>⚗ Calculator</button>
          {compareList.length>=2&&<button className="btn accent-btn" onClick={()=>setShowCompare(true)}>Compare ({compareList.length})</button>}
        </div>
      </div>

      {/* Heatmap legend */}
      {heatProp&&heatRange&&(
        <div className="heatmap-bar">
          <span style={{fontFamily:'monospace',fontSize:'11px',color:'var(--accent)'}}>{HEATMAP_PROPS.find(p=>p.key===heatProp)?.label}</span>
          <span>{heatRange.min.toFixed(1)}</span>
          <div className="gradient"/>
          <span>{heatRange.max.toFixed(1)}</span>
        </div>
      )}

      {/* Category legend */}
      <div className="legend">
        {CATEGORIES.map(cat=><div key={cat.key} className="legend-item"><div className="legend-dot" style={{background:cat.color}}/>{cat.label}</div>)}
        <div className="legend-item" style={{marginLeft:'8px'}}><div className="legend-dot" style={{border:'2px solid rgba(100,200,255,0.5)',background:'rgba(100,200,255,0.12)'}}/>Liquid</div>
        <div className="legend-item"><div className="legend-dot" style={{border:'2px solid rgba(255,150,80,0.5)',background:'rgba(255,150,80,0.12)'}}/>Gas</div>
      </div>

      {/* TABLE */}
      <div className="table-scroll">
        <div className="pt-grid">
          {ELEMENTS.map(el=>{
            const pos=getPos(el);
            const sq=search.toLowerCase().trim();
            const isMatch=sq&&(el.name.toLowerCase().includes(sq)||el.s.toLowerCase().includes(sq)||el.n.toString().includes(sq));
            const isDimmed=(activeFilter&&el.cat!==activeFilter)||(sq&&!isMatch);
            const heatColor=heatProp&&heatRange?getHeatColor(el[heatProp],heatRange.min,heatRange.max):null;
            const phase=getPhase(el);
            const phaseBg=!isDimmed&&phase==='liquid'?stateColors.liquid:!isDimmed&&phase==='gas'?stateColors.gas:'transparent';
            return(
              <div key={el.n} style={{gridColumn:pos.col,gridRow:pos.row,background:phaseBg,borderRadius:'4px'}}>
                <ElementCard el={el} dimmed={isDimmed} heatColor={heatColor} searchMatch={!!isMatch} onClick={()=>setSelected(el)}/>
              </div>
            );
          })}
          <div style={{gridColumn:'1/19',gridRow:7,height:'6px'}}/>
          <div style={{gridColumn:'1/3',gridRow:8,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'5px'}}>
            <span style={{fontSize:'8px',color:'var(--muted)',textAlign:'right',lineHeight:'1.4',fontWeight:'700'}}>Lantha-<br/>nides</span>
          </div>
          <div style={{gridColumn:'1/3',gridRow:9,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'5px'}}>
            <span style={{fontSize:'8px',color:'var(--muted)',textAlign:'right',lineHeight:'1.4',fontWeight:'700'}}>Acti-<br/>nides</span>
          </div>
        </div>
      </div>

      {selected&&<DetailModal el={selected} onClose={()=>setSelected(null)} onCompare={addCompare} compareList={compareList} animOn={animOn} setAnimOn={setAnimOn}/>}
      {showMolar&&<MolarCalc onClose={()=>setShowMolar(false)}/>}
      {showCompare&&<CompareFullModal list={compareList} onClose={()=>setShowCompare(false)}/>}
      <ComparePanel list={compareList} onRemove={el=>setCompareList(prev=>prev.filter(c=>c.n!==el.n))} onClearAll={()=>setCompareList([])} onOpenFull={()=>setShowCompare(true)}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Attendance System | CupX Corporation</title>

  <meta name="description" content="Simple attendance record system built by CupX Corporation for learning and demonstration." />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f172a;
      color: #e5e7eb;
    }

    /* Header (identical to tools page) */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #020617;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover {
      opacity: 0.9;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 15px;
    }

    p.subtitle {
      text-align: center;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    .form-box {
      background-color: #020617;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #020617;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #020617;
    }

    .present {
      color: #22c55e;
      font-weight: bold;
    }

    .absent {
      color: #ef4444;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      background-color: #020617;
      opacity: 0.8;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>CupX Attendance System</h1>
  <a href="/tools/">← Back to Tools</a>
</header>

<main>

  <h2>Attendance System</h2>
  <p class="subtitle">Simple attendance record tool by CupX Corporation</p>

  <div class="form-box">
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">

    <select id="status">
      <option value="Present">Present</option>
      <option value="Absent">Absent</option>
    </select>

    <button onclick="addAttendance()">Add Record</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

</main>

<footer>
  © 2026 CupX Corporation · All rights reserved
</footer>

<script>
  let records = JSON.parse(localStorage.getItem("attendance")) || [];

  function render() {
    const table = document.getElementById("records");
    table.innerHTML = "";

    records.forEach(r => {
      table.innerHTML += `
        <tr>
          <td>${r.name}</td>
          <td>${r.roll}</td>
          <td class="${r.status === 'Present' ? 'present' : 'absent'}">
            ${r.status}
          </td>
          <td>${r.date}</td>
        </tr>
      `;
    });
  }

  function addAttendance() {
    const name = document.getElementById("name").value.trim();
    const roll = document.getElementById("roll").value.trim();
    const status = document.getElementById("status").value;

    if (!name || !roll) {
      alert("Please fill all fields");
      return;
    }

    const record = {
      name,
      roll,
      status,
      date: new Date().toLocaleDateString()
    };

    records.push(record);
    localStorage.setItem("attendance", JSON.stringify(records));

    document.getElementById("name").value = "";
    document.getElementById("roll").value = "";

    render();
  }

  render();
</script>

</body>
</html>

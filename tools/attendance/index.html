<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Attendance System | CupX Corporation</title>

<meta name="description" content="Simple attendance record system built by CupX Corporation for learning and demonstration." />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f172a;
  color: #e5e7eb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background-color: #020617;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

header a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 14px;
}

main {
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

h2 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 15px;
}

p.subtitle {
  text-align: center;
  opacity: 0.85;
  margin-bottom: 40px;
}

.form-box {
  background-color: #020617;
  padding: 25px;
  border-radius: 10px;
  margin-bottom: 30px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #38bdf8;
  color: #020617;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.action-row button {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  background-color: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  text-align: left;
  font-size: 14px;
}

.present {
  color: #22c55e;
  font-weight: bold;
}

.absent {
  color: #ef4444;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  background-color: #020617;
  opacity: 0.8;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <h1>Attendance System</h1>
  <a href="/tools/">← Back to Tools</a>
</header>

<main>

<h2>Attendance System</h2>
<p class="subtitle">Simple attendance record tool by CupX Corporation</p>

<div class="form-box">
  <input type="text" id="name" placeholder="Student Name">
  <input type="text" id="roll" placeholder="Roll Number">

  <select id="status">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
  </select>

  <button onclick="addAttendance()">Add Record</button>
</div>

<div class="action-row">
  <button onclick="exportCSV()">Export Excel</button>
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="clearAll()">Clear All</button>
</div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Roll</th>
      <th>Status</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="records"></tbody>
</table>

</main>

<footer>
  © 2026 CupX Corporation · All rights reserved
</footer>

<script>
let records = JSON.parse(localStorage.getItem("attendance")) || [];

function render() {
  const table = document.getElementById("records");
  table.innerHTML = "";

  records.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${escapeHTML(r.name)}</td>
        <td>${escapeHTML(r.roll)}</td>
        <td class="${r.status === 'Present' ? 'present' : 'absent'}">
          ${r.status}
        </td>
        <td>${r.date}</td>
      </tr>
    `;
  });
}

function addAttendance() {
  const name = document.getElementById("name").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const status = document.getElementById("status").value;

  if (!name || !roll) {
    alert("Please fill all fields");
    return;
  }

  const record = {
    name,
    roll,
    status,
    date: new Date().toLocaleDateString()
  };

  records.push(record);
  localStorage.setItem("attendance", JSON.stringify(records));

  document.getElementById("name").value = "";
  document.getElementById("roll").value = "";

  render();
}

function clearAll() {
  if (confirm("Are you sure you want to delete all records?")) {
    records = [];
    localStorage.removeItem("attendance");
    render();
  }
}

function exportCSV() {
  if (records.length === 0) {
    alert("No data to export.");
    return;
  }

  let csv = "Name,Roll,Status,Date\n";
  records.forEach(r => {
    csv += `"${r.name}","${r.roll}","${r.status}","${r.date}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "attendance_records.csv";
  link.click();
}

function exportPDF() {
  if (records.length === 0) {
    alert("No data to export.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  records.forEach(r => {
    doc.text(`${r.name} | ${r.roll} | ${r.status} | ${r.date}`, 10, y);
    y += 8;
  });

  doc.save("attendance_records.pdf");
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

render();
</script>

</body>
</html>

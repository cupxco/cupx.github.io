<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator | CupX Corporation</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f172a;
  color: #e5e7eb;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background-color: #020617;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

header a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 14px;
}

/* MAIN */
main {
  max-width: 420px;
  margin: 60px auto;
  padding: 20px;
}

.calculator {
  background: #020617;
  padding: 20px;
  border-radius: 18px;
}

.display {
  width: 100%;
  height: 65px;
  font-size: 22px;
  padding: 15px;
  border-radius: 10px;
  border: none;
  text-align: right;
  background: #0f172a;
  color: white;
  margin-bottom: 15px;
  box-sizing: border-box;
}

/* Top control row */
.top-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.clear-btn {
  background: #ef4444;
  color: white;
  font-weight: bold;
}

.mode-btn {
  background: #38bdf8;
  color: #020617;
  font-weight: bold;
}

/* Buttons */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #1e293b;
  color: white;
}

button:hover {
  background: #334155;
}

.operator {
  background: #38bdf8;
  color: #020617;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  background-color: #020617;
  opacity: 0.8;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <h1>Calculator</h1>
  <a href="/tools/">← Back to Tools</a>
</header>

<main>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="top-controls">
  <button class="clear-btn" onclick="clearAll()">Clear</button>
  <button class="mode-btn" onclick="toggleMode()" id="modeText">
    Scientific
  </button>
</div>

<div class="buttons" id="buttons"></div>

</div>

</main>

<footer>
© 2026 CupX Corporation · All rights reserved
</footer>

<script>
let scientific = false;

const basicButtons = [
  "7","8","9","/",
  "4","5","6","*",
  "1","2","3","-",
  "0",".","=","+"
];

const scientificButtons = [
  "sin","cos","tan","log",
  "ln","√","x²","^",
  "π","(",")","/",
  "7","8","9","*",
  "4","5","6","-",
  "1","2","3","+",
  "0",".","="
];

function renderButtons() {
  const container = document.getElementById("buttons");
  container.innerHTML = "";

  const btns = scientific ? scientificButtons : basicButtons;

  btns.forEach(text => {
    const btn = document.createElement("button");
    btn.innerText = text;

    if(["+","-","*","/","="].includes(text)) {
      btn.classList.add("operator");
    }

    btn.onclick = () => handleInput(text);
    container.appendChild(btn);
  });
}

function toggleMode() {
  scientific = !scientific;
  document.getElementById("modeText").innerText =
    scientific ? "Basic" : "Scientific";
  renderButtons();
}

function clearAll() {
  document.getElementById("display").value = "";
}

function handleInput(value) {
  const display = document.getElementById("display");

  if (value === "=") {
    try {
      display.value = calculate(display.value);
    } catch {
      display.value = "Error";
    }
    return;
  }

  if (value === "π") value = "Math.PI";
  if (value === "√") value = "Math.sqrt(";
  if (value === "x²") value = "**2";
  if (value === "^") value = "**";
  if (value === "sin") value = "sin(";
  if (value === "cos") value = "cos(";
  if (value === "tan") value = "tan(";
  if (value === "log") value = "log10(";
  if (value === "ln") value = "Math.log(";

  display.value += value;
}

function calculate(expr) {
  function sin(x){ return Math.sin(x * Math.PI/180); }
  function cos(x){ return Math.cos(x * Math.PI/180); }
  function tan(x){ return Math.tan(x * Math.PI/180); }
  function log10(x){ return Math.log10(x); }

  return eval(expr);
}

renderButtons();
</script>

</body>
</html>

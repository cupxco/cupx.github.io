<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Attendance System | CupX Corporation</title>

<meta name="description" content="Professional attendance system built by CupX Corporation." />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f172a;
  color: #e5e7eb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background-color: #020617;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

header a {
  color: #38bdf8;
  text-decoration: none;
  font-size: 14px;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

h2 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 10px;
}

p.subtitle {
  text-align: center;
  opacity: 0.85;
  margin-bottom: 30px;
}

.form-box {
  background-color: #020617;
  padding: 25px;
  border-radius: 10px;
  margin-bottom: 30px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #38bdf8;
  color: #020617;
  font-weight: bold;
  cursor: pointer;
}

.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.action-row button {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  background-color: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  text-align: left;
  font-size: 14px;
}

th {
  background: #1e40af;
  color: white;
}

.present { color: #22c55e; font-weight: bold; }
.absent { color: #ef4444; font-weight: bold; }

footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  background-color: #020617;
  opacity: 0.8;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <h1>Attendance System</h1>
  <a href="/tools/">← Back to Tools</a>
</header>

<main>

<h2>CupX Attendance System</h2>
<p class="subtitle">Professional Attendance Record Tool</p>

<div class="form-box">
  <input type="text" id="attendanceTitle" placeholder="Attendance Title (Max 40 characters)">
  <input type="text" id="name" placeholder="Student Name">
  <input type="text" id="roll" placeholder="Roll Number">

  <select id="status">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
  </select>

  <button onclick="addAttendance()">Add Record</button>
</div>

<div class="action-row">
  <button onclick="exportExcel()">Export Excel</button>
  <button onclick="exportPDF()">Export PDF</button>
  <button onclick="clearAll()">Clear All</button>
</div>

<table>
<thead>
<tr>
<th>Sr. No</th>
<th>Name</th>
<th>Roll</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>

</main>

<footer>
© 2026 CupX Corporation · All rights reserved
</footer>

<script>
let records = JSON.parse(localStorage.getItem("attendance")) || [];

function render() {
  const table = document.getElementById("records");
  table.innerHTML = "";

  records.forEach((r, index) => {
    table.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHTML(r.name)}</td>
        <td>${escapeHTML(r.roll)}</td>
        <td class="${r.status === 'Present' ? 'present' : 'absent'}">
          ${r.status}
        </td>
        <td>${r.date}</td>
      </tr>
    `;
  });
}

function addAttendance() {
  const title = document.getElementById("attendanceTitle").value.trim().slice(0,40);
  const name = document.getElementById("name").value.trim();
  const roll = document.getElementById("roll").value.trim();
  const status = document.getElementById("status").value;

  if (!name || !roll) {
    alert("Please fill all fields");
    return;
  }

  const record = {
    title,
    name,
    roll,
    status,
    date: new Date().toLocaleDateString()
  };

  records.push(record);
  localStorage.setItem("attendance", JSON.stringify(records));

  document.getElementById("name").value = "";
  document.getElementById("roll").value = "";

  render();
}

function clearAll() {
  if (confirm("Delete all records?")) {
    records = [];
    localStorage.removeItem("attendance");
    render();
  }
}

/* PROFESSIONAL EXCEL EXPORT */
function exportExcel() {
  if (records.length === 0) {
    alert("No data to export.");
    return;
  }

  const title = records[0]?.title || "";

  let html = `
  <html>
  <head>
  <meta charset="UTF-8">
  </head>
  <body>
  <table border="1" style="border-collapse:collapse;">

  <!-- Main Heading -->
  <tr>
    <td colspan="5" style="
      background:#2f5fb3;
      color:white;
      font-size:22px;
      font-weight:bold;
      text-align:center;
      height:45px;
    ">
      CupX Attendance System
    </td>
  </tr>

  <!-- Attendance Title -->
  <tr>
    <td colspan="5" style="
      background:#2f5fb3;
      color:white;
      text-align:center;
      font-weight:600;
    ">
      ${title}
    </td>
  </tr>

  <!-- Column Headers -->
  <tr style="background:#2f5fb3;color:white;font-weight:bold;text-align:center;">
    <td>Sr. No</td>
    <td>Name</td>
    <td>Roll</td>
    <td>Status</td>
    <td>Date</td>
  </tr>
  `;

  records.forEach((r, i) => {
    html += `
    <tr>
      <td>${i + 1}</td>
      <td>${r.name}</td>
      <td>${r.roll}</td>
      <td>${r.status}</td>
      <td>${r.date}</td>
    </tr>
    `;
  });

  html += `
  </table>
  </body>
  </html>
  `;

  const blob = new Blob([html], {
    type: "application/vnd.ms-excel"
  });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "attendance.xls";
  link.click();
  }

/* PROFESSIONAL PDF EXPORT */
function exportPDF() {
  if (records.length === 0) return alert("No data to export.");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const title = records[0]?.title || "";
  const pageHeight = doc.internal.pageSize.height;
  let y = 20;

  function addHeader() {
    doc.setFontSize(18);
    doc.text("CupX Attendance System", 105, 10, {align:"center"});
    doc.setFontSize(12);
    doc.text(title, 105, 18, {align:"center"});
    y = 30;
  }

  addHeader();

  doc.setFontSize(11);

  records.forEach((r,i) => {
    if (y > pageHeight - 10) {
      doc.addPage();
      addHeader();
    }
    doc.text(`${i+1}. ${r.name} | ${r.roll} | ${r.status} | ${r.date}`, 10, y);
    y += 8;
  });

  doc.save("attendance.pdf");
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up | CupX Corporation</title>

  <meta name="description" content="Sign up for CupX Corporation. Page currently under development.">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header (same as tools) */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #020617;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
    }

    header a:hover {
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background-color: #020617;
      padding: 40px;
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
    }

    .card h2 {
      margin-top: 0;
      font-size: 28px;
      margin-bottom: 15px;
    }

    .card p {
      opacity: 0.85;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 14px;
      border-radius: 6px;
      background-color: #334155;
      font-size: 13px;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      background-color: #020617;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header>
  <h1>CupX Sign Up</h1>
  <a href="/">← Back to Home</a>
</header>

<main>
  <div class="card">
    <h2>Sign Up Page</h2>
    <p>
      This feature is currently under development.
      Account creation will be available in a future update.
    </p>
    <div class="badge">Under Development</div>
  </div>
</main>

<footer>
  © 2026 CupX Corporation · All rights reserved
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CupX Insta Username Finder</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#results{
max-width:600px;
margin:auto;
margin-top:20px;
text-align:left;
}

.available{
color:#22c55e;
}

.progress{
margin-top:20px;
color:#94a3b8;
}

</style>

</head>

<body>

<h2>CupX Instagram Username Checker</h2>

<button onclick="startCheck(3)">Check All 3 Characters</button>
<button onclick="startCheck(4)">Check All 4 Characters</button>
<button onclick="stopCheck()">Stop</button>
<button onclick="downloadCSV()">Download CSV</button>

<div class="progress" id="progress"></div>
<div id="results"></div>

<script>

const chars = "abcdefghijklmnopqrstuvwxyz0123456789_.";
let available = [];
let stop = false;
let total = 0;
let current = 0;

function* generate(length) {

let arr = chars.split('');
let indexes = new Array(length).fill(0);

while(true){

yield indexes.map(i => arr[i]).join('');

let pos = length - 1;

while(pos >= 0){
indexes[pos]++;
if(indexes[pos] < arr.length) break;
indexes[pos] = 0;
pos--;
}

if(pos < 0) return;

}

}

async function check(username){

try{

let res = await fetch(
"https://www.instagram.com/" + username + "/?__a=1&__d=dis",
{
method:"GET"
});

if(res.status == 404){

available.push(username);

document.getElementById("results").innerHTML +=
"<div class='available'>"+username+"</div>";

}

}catch(e){}

}

async function startCheck(length){

stop = false;

available = [];
document.getElementById("results").innerHTML = "";

total = Math.pow(chars.length,length);
current = 0;

let gen = generate(length);

for(let username of gen){

if(stop) break;

current++;

document.getElementById("progress").innerText =
current + " / " + total;

await check(username);

await new Promise(r=>setTimeout(r,400));

}

}

function stopCheck(){
stop = true;
}

function downloadCSV(){

let csv = "username\n";

available.forEach(u=>{
csv += u + "\n";
});

let blob = new Blob([csv],{type:"text/csv"});

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "available_instagram.csv";

link.click();

}

</script>

</body>
</html>
